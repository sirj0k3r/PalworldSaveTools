name: Test Changelog Translation

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Draft release version (e.g. 2.1.4)'
        required: true

permissions:
  contents: write

jobs:
  translate-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: |
          uv venv
          uv pip install deep-translator
      - name: Run changelog translation
        run: uv run python scripts/scrs/translate_changelog.py
      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          NOTES=$(cat CHANGELOG.multilang.md)
          gh release create "v${VERSION}-preview" \
            --repo "${{ github.repository }}" \
            --title "v${VERSION} — Changelog Preview" \
            --notes "$NOTES" \
            --draft
